task_root: data/tasks
default_split: dev
agents:
  - heuristic
  - spec_first
  - direct
  - plan_first
  - oracle_spec
models:
  - mock
trials_per_model: 1
good_spec_thresholds: [0.65, 0.75, 0.80]
skip_missing_credentials: true
recommended_max_workers:
  smoke: 2
  api_default: 32
  topconf: 64

experiment_suites:
  smoke:
    split: dev
    agents: [heuristic, spec_first]
    models: [mock]
    trials_per_model: 1
  full_api:
    split: test
    agents: [direct, plan_first, spec_first, oracle_spec]
    models: [gpt_compatible, claude_compatible, gemini_compatible, openrouter_compatible, ollama_local, vllm_local]
    trials_per_model: 3
